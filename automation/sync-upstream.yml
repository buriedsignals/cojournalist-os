name: Sync Upstream

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "coJournalist Sync Bot"
          git config user.email "sync@cojournalist.ai"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/buriedsignals/cojournalist-os.git || true
          git fetch upstream master

      - name: Detect new migrations
        id: migrations
        run: |
          NEW_MIGRATIONS=$(git diff --name-only HEAD upstream/master -- supabase/migrations/ | sort)
          if [ -n "$NEW_MIGRATIONS" ]; then
            echo "has_new_migrations=true" >> "$GITHUB_OUTPUT"
            echo "migration_files<<EOF" >> "$GITHUB_OUTPUT"
            echo "$NEW_MIGRATIONS" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "has_new_migrations=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Merge upstream
        run: git merge upstream/master --no-edit -m "sync: merge upstream $(date -u +%Y-%m-%d)"

      - name: Push merged changes
        run: git push origin master

      - name: Apply new Supabase migrations
        if: steps.migrations.outputs.has_new_migrations == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "::warning::SUPABASE_ACCESS_TOKEN or SUPABASE_PROJECT_REF not set. Apply these migrations manually:"
            echo "${{ steps.migrations.outputs.migration_files }}"
            exit 0
          fi

          npm install -g supabase
          supabase link --project-ref "$SUPABASE_PROJECT_REF"
          supabase db push

      - name: Trigger optional Render redeploy
        if: success()
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$RENDER_DEPLOY_HOOK")
            if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
              echo "::warning::Render deploy hook returned HTTP $HTTP_CODE"
            fi
          else
            echo "No RENDER_DEPLOY_HOOK configured. Skip optional FastAPI/frontend redeploy."
          fi

      - name: Summary
        run: |
          echo "## Sync Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Upstream branch: master" >> "$GITHUB_STEP_SUMMARY"
          echo "- New migrations: ${{ steps.migrations.outputs.has_new_migrations }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Merged at: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_STEP_SUMMARY"
