services:
  - type: web
    name: cojournalist
    runtime: docker
    plan: starter
    region: frankfurt
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: AWS_API_BASE_URL
        value: https://kubbp7dr0b.execute-api.eu-central-1.amazonaws.com/dev
      - key: VITE_API_URL
        value: ''
      - key: DEBUG
        value: false
      - key: PUBLIC_MAPTILER_API_KEY
        sync: false
