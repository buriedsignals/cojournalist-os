# Kong declarative config for Supabase self-hosted gateway
# Mounted into Kong container at /kong/kong.yml
#
# Routes traffic from the public API gateway to internal Supabase services:
#   /auth/v1/*       -> GoTrue (auth:8080)
#   /rest/v1/*       -> PostgREST (rest:3000)
#   /functions/v1/*  -> Edge Runtime (edge-functions:9000)
#
# Authentication is handled by each service individually:
#   - GoTrue: IS the auth service (no gateway auth needed)
#   - PostgREST: validates JWTs via PGRST_JWT_SECRET
#   - Edge Functions: VERIFY_JWT controls per-function JWT validation
# Kong acts as a routing proxy only, matching Supabase's standard config.

_format_version: "2.1"
_transform: true

services:
  - name: auth-v1
    url: http://auth:8080
    routes:
      - name: auth-v1-route
        strip_path: true
        paths:
          - /auth/v1/
    plugins:
      - name: cors

  - name: rest-v1
    url: http://rest:3000
    routes:
      - name: rest-v1-route
        strip_path: true
        paths:
          - /rest/v1/
    plugins:
      - name: cors

  - name: functions-v1
    url: http://edge-functions:9000
    routes:
      - name: functions-v1-route
        strip_path: true
        paths:
          - /functions/v1/
    plugins:
      - name: cors
