<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="broadcast-grad" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#968bdf"/>
      <stop offset="100%" stop-color="#7c6fc7"/>
    </linearGradient>
  </defs>

  <!-- Outer broadcast arc -->
  <path d="M 10 32 A 22 22 0 0 1 54 32"
        fill="none" stroke="url(#broadcast-grad)" stroke-width="5"
        stroke-linecap="round" opacity="0.4"/>

  <!-- Inner broadcast arc -->
  <path d="M 18 32 A 14 14 0 0 1 46 32"
        fill="none" stroke="url(#broadcast-grad)" stroke-width="5"
        stroke-linecap="round" opacity="0.7"/>

  <!-- Central dot -->
  <circle cx="32" cy="40" r="8" fill="url(#broadcast-grad)"/>
</svg>
