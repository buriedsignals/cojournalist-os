<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/icon-broadcast.svg" type="image/svg+xml" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>coJournalist - AI-Powered Journalism Assistant</title>
		<meta name="description" content="The journalist's assistant for monitoring news feeds, government data, social media, and the web. Focus on the reporting, let your assistant monitor the noise and surface leads." />

		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website" />
		<meta property="og:title" content="coJournalist - AI-Powered Journalism Assistant" />
		<meta property="og:description" content="Focus on the reporting, let your assistant monitor the noise and surface leads." />
		<meta property="og:image" content="%sveltekit.assets%/og-image.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />

		<!-- Twitter -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="coJournalist - AI-Powered Journalism Assistant" />
		<meta name="twitter:description" content="Focus on the reporting, let your assistant monitor the noise and surface leads." />
		<meta name="twitter:image" content="%sveltekit.assets%/og-image.png" />

		<!-- Prevent flash of unstyled content -->
		<style>
			html { visibility: hidden; }
			html.ready { visibility: visible; }
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
		<script>
			// Show content once DOM is ready and styles are applied
			document.documentElement.classList.add('ready');
		</script>
	</body>
</html>
